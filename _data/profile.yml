short_bio: >-
  <p> I am an M.Sc. student in Computer Science at <a href="https://bit.edu.cn/" target="_blank">Beijing Institute of Technology</a>, supervised by Prof. <a href="https://ronghuali.github.io/ronghuali.html" target="_blank">Rong-Hua Li</a>. My work centers on <strong>Agentic AI</strong> and <strong>Large Reasoning Models (LRMs)</strong>. My research focuses on enhancing LLMs' capabilities in tool usage, algorithmic problem-solving, and long-horizon planning through reinforcement learning. I am interested in enabling agents to decompose problems, select tools, execute actions, and iteratively refine solutions, bridging language reasoning with interactive learning. 
  </p>
  <p> In parallel, I keep a strong hobby-level interest in <strong>quantitative trading</strong>, where I design and explore deep learning-based trading algorithms. 
  </p>
